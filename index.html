<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>제리샵 디4 시세표</title>
    <meta name="description" content="제리샵 디아블로4 시세표" />
    <meta name="jerryshop-version" content="security-clean-20260515-001" />
    <style>
      :root {
        color-scheme: light;
        --ink: #17121b;
        --paper: #fffdf8;
        --soft: #fff0f7;
        --pink: #ff78b3;
        --hot: #ff3f93;
        --mint: #45dec8;
        --sky: #70d7ff;
        --yellow: #fee500;
        --line: #221828;
        --muted: #6d6272;
        --shadow: 7px 7px 0 rgba(23, 18, 27, 0.95);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          linear-gradient(135deg, rgba(255, 120, 179, 0.16) 0 25%, transparent 25% 50%, rgba(112, 215, 255, 0.14) 50% 75%, transparent 75%),
          linear-gradient(180deg, #fff7fc 0%, #f2f6ff 54%, #fff8ea 100%);
        background-size: 28px 28px, auto;
        color: var(--ink);
        font-family:
          Pretendard,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 17px;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      .page {
        width: min(100%, 940px);
        margin: 0 auto;
        padding: 20px 14px 92px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 14px;
        align-items: stretch;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        background:
          linear-gradient(135deg, var(--paper) 0 62%, #ffd8eb 62% 100%);
        box-shadow: var(--shadow);
      }

      .brand-main {
        display: grid;
        grid-template-columns: 118px minmax(0, 1fr);
        gap: 16px;
        align-items: center;
        min-width: 0;
      }

      .logo {
        display: block;
        width: 118px;
        aspect-ratio: 1;
        overflow: hidden;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: #ffb6d7;
        box-shadow: 5px 5px 0 var(--pink);
      }

      .logo img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        border: 2px solid var(--line);
        border-radius: 999px;
        padding: 5px 9px;
        background: var(--mint);
        color: var(--ink);
        font-size: 0.78rem;
        font-weight: 1000;
      }

      h1 {
        margin: 9px 0 0;
        color: var(--ink);
        font-size: clamp(2.45rem, 8vw, 4.6rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .hero p {
        margin: 8px 0 0;
        color: #413449;
        font-size: 1.08rem;
        font-weight: 900;
        line-height: 1.45;
      }

      .hero-side {
        display: grid;
        gap: 10px;
      }

      .live-pill {
        display: grid;
        align-content: center;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: var(--ink);
        color: #fff;
        text-align: center;
      }

      .live-pill span,
      .live-pill strong {
        display: block;
      }

      .live-pill span {
        color: var(--mint);
        font-size: 0.78rem;
        font-weight: 1000;
      }

      .live-pill strong {
        margin-top: 4px;
        color: #fff;
        font-size: 1.7rem;
        line-height: 1;
      }

      .header-actions {
        display: grid;
        gap: 8px;
      }

      .header-actions a,
      .header-actions button,
      .contact a,
      .contact button,
      .modal button {
        display: grid;
        place-items: center;
        border: 2px solid var(--line);
        border-radius: 8px;
        min-height: 54px;
        padding: 12px;
        color: var(--ink);
        font-size: 1.08rem;
        font-weight: 1000;
        line-height: 1.1;
        text-align: center;
        text-decoration: none;
        box-shadow: 4px 4px 0 var(--line);
        cursor: pointer;
        transition:
          transform 150ms ease,
          box-shadow 150ms ease,
          filter 150ms ease;
        user-select: none;
      }

      .header-actions a:hover,
      .header-actions button:hover,
      .contact a:hover,
      .contact button:hover,
      .modal button:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--line);
        filter: saturate(1.06);
      }

      .header-actions a:active,
      .header-actions button:active,
      .contact a:active,
      .contact button:active,
      .modal button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 var(--line);
      }

      .header-actions a:first-child,
      .contact a:first-child,
      .modal button {
        background: var(--yellow);
      }

      .header-actions a:last-child,
      .contact a:last-child {
        background: var(--sky);
      }

      .header-actions button,
      .contact button {
        background: var(--mint);
      }

      .meta {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .chip {
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
        background: #fff;
        color: var(--ink);
        font-size: 0.92rem;
        font-weight: 1000;
        text-align: center;
      }

      .chip:nth-child(2) {
        background: #ffe0ef;
      }

      .chip:nth-child(3) {
        background: #e5fff8;
      }

      .notice {
        margin: 19px auto 16px;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 13px 15px;
        background: var(--ink);
        color: #fff;
        box-shadow: 5px 5px 0 var(--pink);
        text-align: center;
        font-weight: 1000;
        line-height: 1.45;
      }

      .price-list {
        counter-reset: price-card;
        display: grid;
        gap: 14px;
      }

      .card {
        counter-increment: price-card;
        position: relative;
        overflow: hidden;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: 5px 5px 0 rgba(23, 18, 27, 0.9);
        text-align: left;
      }

      .card:nth-child(3n + 1) h2 {
        background: #ffe0ef;
      }

      .card:nth-child(3n + 2) h2 {
        background: #e5fff8;
      }

      .card:nth-child(3n) h2 {
        background: #fff4bf;
      }

      .card h2 {
        position: relative;
        margin: 0;
        border-bottom: 2px solid var(--line);
        padding: 16px 16px 16px 76px;
        color: var(--ink);
        font-size: clamp(1.38rem, 4.7vw, 1.86rem);
        line-height: 1.25;
      }

      .card h2::before {
        content: counter(price-card, decimal-leading-zero);
        position: absolute;
        left: 14px;
        top: 50%;
        display: grid;
        place-items: center;
        width: 42px;
        height: 34px;
        transform: translateY(-50%);
        border: 2px solid var(--line);
        border-radius: 999px;
        background: var(--mint);
        color: var(--ink);
        font-size: 0.85rem;
        font-weight: 1000;
      }

      .rows {
        display: grid;
        gap: 9px;
        padding: 14px;
      }

      .row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) max-content;
        align-items: center;
        gap: 12px;
        border: 1px solid #eadfea;
        border-radius: 8px;
        min-height: 48px;
        padding: 11px 12px;
        background: #fff;
        color: var(--ink);
        font-size: 1.08rem;
      }

      .row.price-row {
        width: 100%;
        cursor: pointer;
        text-align: left;
      }

      .row.price-row.selected {
        border-color: var(--hot);
        background: #fff0f7;
        box-shadow: inset 0 0 0 2px rgba(255, 63, 147, 0.18);
      }

      .row.price-row.selected strong {
        background: var(--hot);
      }

      .row strong {
        border: 2px solid var(--line);
        border-radius: 999px;
        min-width: 104px;
        padding: 5px 11px;
        background: var(--ink);
        color: #fff;
        font-size: 1.04rem;
        text-align: center;
        white-space: nowrap;
      }

      .row span {
        min-width: 0;
        font-weight: 900;
        line-height: 1.25;
      }

      .note {
        display: block;
        border-color: #ffe4a3;
        background: #fff8dd;
        color: #5f4a22;
        text-align: center;
        font-size: 1.04rem;
        font-weight: 900;
        line-height: 1.45;
      }

      .empty {
        border: 2px dashed var(--line);
        border-radius: 8px;
        padding: 28px 14px;
        background: #fff;
        color: var(--muted);
        text-align: center;
      }

      .contact {
        position: fixed;
        left: 50%;
        right: auto;
        bottom: 14px;
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(4, max-content);
        gap: 8px;
        width: max-content;
        max-width: calc(100% - 110px);
        transform: translateX(-50%);
      }

      .contact a,
      .contact button {
        min-height: 42px;
        padding: 10px 16px;
        font-size: 0.98rem;
      }

      .cart-count {
        display: inline-grid;
        place-items: center;
        min-width: 24px;
        height: 24px;
        margin-left: 4px;
        border: 2px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-size: 0.82rem;
      }

      .cart-items {
        display: grid;
        gap: 8px;
        max-height: 28vh;
        overflow: auto;
        margin: 12px 0;
      }

      .cart-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 2px solid #eadfea;
        border-radius: 8px;
        padding: 10px;
        background: #fff;
      }

      .cart-item b,
      .cart-item span {
        display: block;
      }

      .cart-item b {
        font-size: 0.95rem;
      }

      .cart-item span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 900;
      }

      .cart-item button {
        min-height: 34px;
        padding: 6px 9px;
        background: var(--pink);
        font-size: 0.82rem;
      }

      .buyer-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
      }

      .buyer-grid label {
        display: grid;
        gap: 6px;
        font-size: 0.88rem;
        font-weight: 1000;
      }

      .cart-empty {
        border: 2px dashed var(--line);
        border-radius: 8px;
        padding: 18px 12px;
        background: #fff;
        color: var(--muted);
        text-align: center;
        font-weight: 1000;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(23, 18, 27, 0.72);
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: min(100%, 820px);
        max-height: 90vh;
        overflow: auto;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .modal h2 {
        margin: 0;
        color: var(--ink);
      }

      .modal p {
        margin: 8px 0 14px;
        color: var(--muted);
        line-height: 1.55;
      }

      .modal input,
      .modal textarea {
        width: 100%;
        border: 2px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
        color: var(--ink);
        outline: none;
      }

      .modal textarea {
        min-height: 46vh;
        resize: vertical;
        line-height: 1.55;
        white-space: pre;
      }

      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .modal button.secondary {
        background: #e8f8ff;
        color: var(--ink);
      }

      .modal button.danger {
        background: var(--pink);
        color: var(--ink);
      }

      .admin-panel {
        display: none;
      }

      .admin-panel.open {
        display: block;
      }

      .admin-settings {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }

      .admin-settings label {
        display: grid;
        gap: 6px;
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 1000;
      }

      .hint {
        margin-top: 10px;
        color: #d92368;
        font-size: 0.9rem;
        font-weight: 1000;
      }

      @media (max-width: 720px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-side {
          grid-template-columns: 104px minmax(0, 1fr);
          align-items: stretch;
        }

      }

      @media (max-width: 520px) {
        body {
          font-size: 16px;
        }

        .page {
          padding: 12px 9px 86px;
        }

        .hero {
          padding: 10px;
          box-shadow: 5px 5px 0 var(--line);
        }

        .brand-main {
          grid-template-columns: 82px minmax(0, 1fr);
          gap: 11px;
        }

        .logo {
          width: 82px;
          box-shadow: 4px 4px 0 var(--pink);
        }

        h1 {
          font-size: clamp(2.25rem, 13vw, 3.2rem);
        }

        .hero p {
          font-size: 0.98rem;
        }

        .hero-side {
          grid-template-columns: 84px minmax(0, 1fr);
          gap: 8px;
        }

        .live-pill {
          padding: 8px 6px;
        }

        .live-pill strong {
          font-size: 1.35rem;
        }

        .header-actions a {
          min-height: 58px;
          padding: 10px 6px;
          font-size: 1.02rem;
        }

        .meta {
          grid-template-columns: 1fr;
        }

        .admin-settings {
          grid-template-columns: 1fr;
        }

        .card h2 {
          padding: 14px 12px 14px 63px;
        }

        .card h2::before {
          left: 11px;
          width: 38px;
          height: 30px;
        }

        .rows {
          gap: 8px;
          padding: 10px;
        }

        .row {
          grid-template-columns: minmax(0, 1fr) max-content;
          gap: 8px;
          min-height: 46px;
          padding: 10px;
          font-size: 1.02rem;
        }

        .row strong {
          min-width: 88px;
          padding: 5px 8px;
          font-size: 0.98rem;
        }

        .contact {
          left: 50%;
          right: auto;
          bottom: 9px;
          width: calc(100% - 104px);
          max-width: 390px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          transform: translateX(-50%);
        }

        .contact a,
        .contact button {
          min-height: 40px;
          padding: 8px 10px;
          font-size: 0.92rem;
        }

        .buyer-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

        applySiteSettings({});
        originalText = await loadPriceText();
        renderPriceList(originalText);
        renderCart();
        bootChannelTalk();
      }

      function applySiteSettings(settings) {
        siteSettings = {
          ...defaultSiteSettings,
          ...Object.fromEntries(
            Object.entries(settings || {}).filter(([, value]) => typeof value === "string" && value.trim())
          )
        };

        document.querySelector("#noticeText").textContent = siteSettings.notice;
        document.querySelector("#kakaoOneTop").href = siteSettings.kakaoOneUrl;
        document.querySelector("#kakaoOneFloat").href = siteSettings.kakaoOneUrl;
        document.querySelector("#kakaoGroupTop").href = siteSettings.kakaoGroupUrl;
        document.querySelector("#kakaoGroupFloat").href = siteSettings.kakaoGroupUrl;

        if (noticeEditor) noticeEditor.value = siteSettings.notice;
        if (kakaoOneEditor) kakaoOneEditor.value = siteSettings.kakaoOneUrl;
        if (kakaoGroupEditor) kakaoGroupEditor.value = siteSettings.kakaoGroupUrl;
      }

      function readSiteSettingsFromEditor() {
        return {
          notice: noticeEditor.value.trim(),
          kakaoOneUrl: kakaoOneEditor.value.trim(),
          kakaoGroupUrl: kakaoGroupEditor.value.trim()
        };
      }

      async function loadPriceText() {
        try {
          const savedResponse = await fetch("api/price", { cache: "no-store" });
          if (savedResponse.ok) {
            const savedData = await savedResponse.json();
            if (savedData.settings) applySiteSettings(savedData.settings);
            if (savedData.text) return savedData.text;
          }
        } catch {}

        try {
          const response = await fetch("가격표.txt", { cache: "no-store" });
          if (!response.ok) throw new Error("가격표를 불러오지 못했습니다.");
          return await response.text();
        } catch {
          return "";
        }
      }

      function renderPriceList(text) {
        const sections = parsePriceText(text);
        if (!sections.length) {
          priceList.innerHTML = '<div class="empty">가격표 내용을 불러오지 못했습니다.</div>';
          return;
        }

        priceList.innerHTML = sections
          .map(
            (section) => `
              <article class="card">
                <h2>${escapeHtml(section.title)}</h2>
                <div class="rows">
                  ${section.rows
                    .map((row) => {
                      if (!row.price) return `<div class="row note">${escapeHtml(row.label)}</div>`;
                      const key = cartKey(section.title, row.label, row.price);
                      return `<button class="row price-row ${cart.has(key) ? "selected" : ""}" type="button" data-cart-key="${escapeHtml(key)}" data-title="${escapeHtml(section.title)}" data-label="${escapeHtml(row.label)}" data-price="${escapeHtml(row.price)}"><span>${escapeHtml(row.label)}</span><strong>${escapeHtml(row.price)}</strong></button>`;
                    })
                    .join("")}
                </div>
              </article>
            `
          )
          .join("");
        bindPriceRows();
      }

      function parsePriceText(text) {
        return text
          .split(/＊{5,}/g)
          .map((block) =>
            block
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter(Boolean)
          )
          .filter((lines) => lines.length)
          .map((lines) => {
            const title = lines[0].replace(/\uFE0F/g, "");
            const rows = lines.slice(1).map(parseRow).filter(Boolean);
            return { title, rows };
          });
      }

      function parseRow(line) {
        const clean = line.replace(/^--\s*/, "").trim();
        if (!clean) return null;
        const parts = clean.split(/\s*=\s*/);
        if (parts.length >= 2) {
          return {
            label: parts.shift().trim(),
            price: parts.join(" = ").trim()
          };
        }
        return { label: clean, price: "" };
      }

      function cartKey(title, label, price) {
        return `${title}|||${label}|||${price}`;
      }

      function bindPriceRows() {
        priceList.querySelectorAll("[data-cart-key]").forEach((button) => {
          button.addEventListener("click", () => {
            const key = button.dataset.cartKey;
            if (cart.has(key)) {
              cart.delete(key);
              button.classList.remove("selected");
            } else {
              cart.set(key, {
                title: button.dataset.title,
                label: button.dataset.label,
                price: button.dataset.price
              });
              button.classList.add("selected");
            }
            renderCart();
          });
        });
      }

      function renderCart() {
        document.querySelectorAll("[data-cart-count]").forEach((count) => {
          count.textContent = String(cart.size);
        });

        if (!cart.size) {
          cartItems.innerHTML = '<div class="cart-empty">가격표에서 원하는 품목을 눌러 담아주세요.</div>';
          return;
        }

        cartItems.innerHTML = [...cart.entries()]
          .map(
            ([key, item]) => `
              <div class="cart-item">
                <div>
                  <b>${escapeHtml(item.title)}</b>
                  <span>${escapeHtml(item.label)} / ${escapeHtml(item.price)}</span>
                </div>
                <button type="button" data-remove-cart="${escapeHtml(key)}">삭제</button>
              </div>
            `
          )
          .join("");

        cartItems.querySelectorAll("[data-remove-cart]").forEach((button) => {
          button.addEventListener("click", () => {
            cart.delete(button.dataset.removeCart);
            renderCart();
            renderPriceList(originalText);
          });
        });
      }

      function openCartModal() {
        renderCart();
        cartModal.classList.add("open");
      }

      function closeCartModal() {
        cartModal.classList.remove("open");
      }

      function clearCart() {
        cart.clear();
        renderCart();
        renderPriceList(originalText);
      }

      function buildOrderText() {
        const lines = ["[제리샵 주문 상담]", ""];
        if (cart.size) {
          lines.push("[담은 품목]");
          [...cart.values()].forEach((item, index) => {
            lines.push(`${index + 1}. ${item.title} / ${item.label} / ${item.price}`);
          });
        } else {
          lines.push("[담은 품목]");
          lines.push("- 상담 후 결정");
        }

        lines.push("");
        lines.push("[구매자 정보]");
        lines.push(`배틀태그: ${battleTagInput.value.trim()}`);
        lines.push(`입금자명: ${depositorInput.value.trim()}`);
        return lines.join("\n");
      }

      async function copyOrder() {
        await copyText(buildOrderText());
        alert("주문서가 복사됐습니다. 상담창에 붙여넣어 주세요.");
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }

      function bootChannelTalk() {
        if (!CHANNEL_PLUGIN_KEY || window.ChannelIO) return;

        const w = window;
        const ch = function () {
          ch.c(arguments);
        };
        ch.q = [];
        ch.c = function (args) {
          ch.q.push(args);
        };
        w.ChannelIO = ch;

        const script = document.createElement("script");
        script.async = true;
        script.src = "https://cdn.channel.io/plugin/ch-plugin-web.js";
        script.onload = () => {
          window.ChannelIO("boot", { pluginKey: CHANNEL_PLUGIN_KEY });
        };
        document.head.appendChild(script);
      }

      function openChannelTalk() {
        if (CHANNEL_PLUGIN_KEY && window.ChannelIO) {
          window.ChannelIO("showMessenger");
          return;
        }
        alert("채널톡 플러그인 키를 넣으면 이 버튼으로 상담창이 열립니다.");
      }

      function openAdminModal() {
        modal.classList.add("open");
        passwordPanel.style.display = "block";
        adminPanel.classList.remove("open");
        passwordInput.value = "";
        loginHint.textContent = "";
        setTimeout(() => passwordInput.focus(), 50);
      }

      const adminGesture = document.querySelector("#adminGesture");
      let adminHoldTimer = null;

      function clearAdminHold() {
        if (adminHoldTimer) {
          clearTimeout(adminHoldTimer);
          adminHoldTimer = null;
        }
      }

      adminGesture.addEventListener("pointerdown", (event) => {
        if (event.button && event.button !== 0) return;
        clearAdminHold();
        adminHoldTimer = setTimeout(() => {
          adminHoldTimer = null;
          if (navigator.vibrate) navigator.vibrate(20);
          openAdminModal();
        }, 1500);
      });
      adminGesture.addEventListener("pointerup", clearAdminHold);
      adminGesture.addEventListener("pointerleave", clearAdminHold);
      adminGesture.addEventListener("pointercancel", clearAdminHold);
      adminGesture.addEventListener("contextmenu", (event) => event.preventDefault());

      document.querySelector("#cartFloat").addEventListener("click", openCartModal);
      document.querySelector("#channelTop").addEventListener("click", openChannelTalk);
      document.querySelector("#channelFloat").addEventListener("click", openChannelTalk);
      document.querySelector("#closeCartButton").addEventListener("click", closeCartModal);
      document.querySelector("#clearCartButton").addEventListener("click", clearCart);
      document.querySelector("#copyOrderButton").addEventListener("click", copyOrder);
      document.querySelector("#copyChannelButton").addEventListener("click", async () => {
        await copyOrder();
        openChannelTalk();
      });
      cartModal.addEventListener("click", (event) => {
        if (event.target === cartModal) closeCartModal();
      });

      document.querySelector("#closeButton").addEventListener("click", closeModal);
      document.querySelector("#closeEditorButton").addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) closeModal();
      });

      document.querySelector("#loginButton").addEventListener("click", unlockEditor);
      passwordInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") unlockEditor();
      });

      document.querySelector("#previewButton").addEventListener("click", () => {
        renderPriceList(priceEditor.value);
      });

      document.querySelector("#saveButton").addEventListener("click", async () => {
        const text = priceEditor.value;
        const settings = readSiteSettingsFromEditor();

        if (!serverSession) {
          alert("로그인이 필요합니다.");
          return;
        }

        try {
          const response = await fetch("api/price", {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json"
            },
            body: JSON.stringify({ text, settings })
          });
          if (!response.ok) {
            throw new Error("저장에 실패했습니다.");
          }
          applySiteSettings(settings);
          originalText = text;
          renderPriceList(text);
          alert("저장했습니다.");
        } catch (error) {
          alert("저장에 실패했습니다.");
        }
      });

      document.querySelector("#copyButton").addEventListener("click", async () => {
        await navigator.clipboard.writeText(priceEditor.value);
      });

      document.querySelector("#resetButton").addEventListener("click", () => {
        applySiteSettings(defaultSiteSettings);
        noticeEditor.value = defaultSiteSettings.notice;
        kakaoOneEditor.value = defaultSiteSettings.kakaoOneUrl;
        kakaoGroupEditor.value = defaultSiteSettings.kakaoGroupUrl;
        priceEditor.value = originalText;
        renderPriceList(originalText);
      });

      async function unlockEditor() {
        serverSession = false;

        try {
          const response = await fetch("api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json"
            },
            body: JSON.stringify({ password: passwordInput.value })
          });

          if (!response.ok) {
            loginHint.textContent = "비밀번호가 다릅니다.";
            return;
          }

          serverSession = true;
        } catch {
          loginHint.textContent = "로그인할 수 없습니다.";
          return;
        }

        passwordPanel.style.display = "none";
        adminPanel.classList.add("open");
        priceEditor.value = originalText;
        noticeEditor.value = siteSettings.notice;
        kakaoOneEditor.value = siteSettings.kakaoOneUrl;
        kakaoGroupEditor.value = siteSettings.kakaoGroupUrl;
      }

      function closeModal() {
        modal.classList.remove("open");
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
